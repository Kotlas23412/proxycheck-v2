name: Generate Happ/TXT Export (Top 10)

on:
  workflow_run:
    workflows: ["Daily DOCKER check"]
    types: [completed]
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  export-proxies:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geoip2 maxminddb

      - name: Run Happ JSON and TXT generator
        run: python tools/generate_happ_export.py

      - name: Commit and push generated proxy files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Здесь добавлен флаг -f, чтобы игнорировать правила .gitignore
          git add -f proxy/top10_proxies.txt
          git add -f proxy/top10_happ.json
          
          if ! git diff --cached --quiet; then
            git commit -m "Update Top 10 proxies (TXT + Happ JSON) [automated]"
            # Pull to avoid conflicts if another action pushed simultaneously
            git pull --rebase origin main || true
            git push
          else
            echo "Нет изменений в топ 10 прокси, пуш не требуется"
          fi
