name: Generate VLESS Configs

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  
  workflow_dispatch:  # Ручной запуск
  
  push:
    branches:
      - main
    paths:
      - 'configs/**'
      - 'tool/scripts/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 🚀 Run generator script
      run: |
        cd tool
        python scripts/generate_vless_groups.py
    
    - name: 📊 Check generated files
      run: |
        echo "=== Созданные файлы ==="
        ls -lh tool/output/vless_configs/
        echo "=== Всего файлов: ==="
        ls tool/output/vless_configs/ | wc -l
    
    - name: 💾 Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add tool/output/vless_configs/
        git diff --staged --quiet || git commit -m "🤖 Auto-update VLESS configs [$(date +'%Y-%m-%d %H:%M:%S')]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vless-configs-${{ github.run_number }}
        path: tool/output/vless_configs/
        retention-days: 30
